services:
  - type: web
    name: trading-journal
    env: node
    plan: free
    buildCommand: sed -i 's/provider = "sqlite"/provider = "postgresql"/' prisma/schema.prisma && npm install && npx prisma db push && npm run build
    startCommand: npm run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: trading-journal-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        value: https://trading-journal.onrender.com

databases:
  - name: trading-journal-db
    plan: free
    databaseName: trading_journal
    user: trading_user
